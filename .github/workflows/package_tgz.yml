name: Release tarball

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: i386
            triplet: i686-linux-gnu
            sysproc: i686
            crosspkg: crossbuild-essential-i386
          - arch: armel
            triplet: arm-linux-gnueabi
            sysproc: arm
            crosspkg: crossbuild-essential-armel
          - arch: armhf
            triplet: arm-linux-gnueabihf
            sysproc: arm
            crosspkg: crossbuild-essential-armhf
          - arch: arm64
            triplet: aarch64-linux-gnu
            sysproc: aarch64
            crosspkg: crossbuild-essential-arm64
          - arch: ppc64el
            triplet: powerpc64le-linux-gnu
            sysproc: ppc64le
            crosspkg: crossbuild-essential-ppc64el
          - arch: riscv64
            triplet: riscv64-linux-gnu
            sysproc: riscv64
            crosspkg: crossbuild-essential-riscv64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libssl-dev libpcap-dev ${{ matrix.crosspkg }}
        # i386/armel: no libssl-dev on Ubuntu, see -DDIPIRADIOHEAD_TLS=OFF below. others: ports arches, scoped update from ports.ubuntu.com
        # dipiret (libpcap+pthread edge daemon) makes no sense on i386/armel either - skipped there too
        case "${{ matrix.arch }}" in
          i386|armel|amd64) ;;
          *)
            sudo dpkg --add-architecture ${{ matrix.arch }}
            CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
            cat <<EOF | sudo tee /etc/apt/sources.list.d/ports-${{ matrix.arch }}.list
        deb [arch=${{ matrix.arch }}] http://ports.ubuntu.com/ubuntu-ports $CODENAME main universe restricted multiverse
        deb [arch=${{ matrix.arch }}] http://ports.ubuntu.com/ubuntu-ports $CODENAME-updates main universe restricted multiverse
        deb [arch=${{ matrix.arch }}] http://ports.ubuntu.com/ubuntu-ports $CODENAME-security main universe restricted multiverse
        EOF
            sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/ports-${{ matrix.arch }}.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0"
            sudo apt-get install -y libssl-dev:${{ matrix.arch }} libpcap-dev:${{ matrix.arch }} || sudo apt-get install -y libssl-dev:${{ matrix.arch }}
            ;;
        esac
    - name: configure
      run: |
        CROSS_ARGS=""
        if [ -n "${{ matrix.triplet }}" ]; then
          CROSS_ARGS="-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.sysproc }} -DCMAKE_C_COMPILER=${{ matrix.triplet }}-gcc -DCMAKE_LIBRARY_ARCHITECTURE=${{ matrix.triplet }}"
        fi
        TLS_ARGS=""
        case "${{ matrix.arch }}" in
          i386|armel) TLS_ARGS="-DDIPIRADIOHEAD_TLS=OFF -DDIPITVHEAD_TLS=OFF" ;;
          amd64) ;;
          *) TLS_ARGS="-DOPENSSL_INCLUDE_DIR=/usr/include -DOPENSSL_CRYPTO_LIBRARY=/usr/lib/${{ matrix.triplet }}/libcrypto.a -DOPENSSL_SSL_LIBRARY=/usr/lib/${{ matrix.triplet }}/libssl.a" ;;
        esac
        cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -DDVBIPITOOLS_STATIC=ON $CROSS_ARGS $TLS_ARGS
    - name: make
      run: cmake --build ${{github.workspace}}/build --config Release
    - name: packaging
      run: |
        PKGDIR="dvbipitools-${{github.ref_name}}-linux-${{ matrix.arch }}"
        mkdir "${PKGDIR}"
        install -m 0755 build/src/dipirec/dipirec "${PKGDIR}/"
        install -m 0755 build/src/dipiscan/dipiscan "${PKGDIR}/"
        install -m 0755 build/src/dipiradiohead/dipiradiohead "${PKGDIR}/"
        install -m 0755 build/src/dipisds/dipisds "${PKGDIR}/"
        install -m 0755 build/src/dipixmltv/dipixmltv "${PKGDIR}/"
        install -m 0755 build/src/dipibim/dipibim "${PKGDIR}/"
        install -m 0755 build/src/dipiepg/dipiepg "${PKGDIR}/"
        install -m 0755 build/src/dipitvhead/dipitvhead "${PKGDIR}/"
        # dipiret needs libpcap and is skipped by its own CMakeLists.txt if not found for this arch - don't fail packaging of the other 8 tools if so
        [ -f build/src/dipiret/dipiret ] && install -m 0755 build/src/dipiret/dipiret "${PKGDIR}/"
        tar czf "${PKGDIR}.tar.gz" "${PKGDIR}"
    - uses: actions/upload-artifact@v5
      with:
        name: tarball-${{ matrix.arch }}
        path: dvbipitools-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v5
      with:
        pattern: tarball-*
        merge-multiple: true
        path: dist
    - name: assets
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.tar.gz
