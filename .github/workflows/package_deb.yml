name: Debian package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
          - arch: armhf
            crosspkg: crossbuild-essential-armhf
          - arch: arm64
            crosspkg: crossbuild-essential-arm64
          - arch: ppc64el
            crosspkg: crossbuild-essential-ppc64el
          - arch: riscv64
            crosspkg: crossbuild-essential-riscv64
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake debhelper devscripts libssl-dev ${{ matrix.crosspkg }}
        # native libpcap-dev only for amd64: it ships /usr/bin/pcap-config with arch-specific content,
        # so it can't coexist with a foreign-arch libpcap-dev:$arch in the same job
        if [ "${{ matrix.arch }}" = "amd64" ]; then
          sudo apt-get install -y libpcap-dev
        fi
        # ports arches aren't on the default mirrors; scoped update from ports.ubuntu.com only
        if [ "${{ matrix.arch }}" != "amd64" ]; then
          sudo dpkg --add-architecture ${{ matrix.arch }}
          CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
          {
            echo "deb [arch=${{ matrix.arch }}] http://ports.ubuntu.com/ubuntu-ports $CODENAME main universe restricted multiverse"
            echo "deb [arch=${{ matrix.arch }}] http://ports.ubuntu.com/ubuntu-ports $CODENAME-updates main universe restricted multiverse"
            echo "deb [arch=${{ matrix.arch }}] http://ports.ubuntu.com/ubuntu-ports $CODENAME-security main universe restricted multiverse"
          } | sudo tee /etc/apt/sources.list.d/ports-${{ matrix.arch }}.list
          sudo apt-get update -o Dir::Etc::sourcelist="sources.list.d/ports-${{ matrix.arch }}.list" -o Dir::Etc::sourceparts="-" -o APT::Get::List-Cleanup="0"
          sudo apt-get install -y libssl-dev:${{ matrix.arch }} libpcap-dev:${{ matrix.arch }}
        fi
    - name: packaging
      run: |
        if [ "${{ matrix.arch }}" = "amd64" ]; then
          dpkg-buildpackage -us -uc -b
        else
          dpkg-buildpackage -us -uc -b -a${{ matrix.arch }} -d
        fi
        mv ../*.deb .
    - uses: actions/upload-artifact@v5
      with:
        name: deb-${{ matrix.arch }}
        path: '*.deb'

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v5
      with:
        pattern: deb-*
        merge-multiple: true
        path: dist
    - name: assets
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.deb
