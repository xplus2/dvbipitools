name: Debian package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: build dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential cmake debhelper devscripts
    - name: packaging
      run: dpkg-buildpackage -us -uc -b
    - name: assets
      uses: softprops/action-gh-release@v2
      with:
        files: ../*.deb
